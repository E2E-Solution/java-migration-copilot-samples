# Local Profile with Azure Services
spring.application.name=assets-manager

# Management endpoints configuration for Azure
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# Azure Blob Storage Configuration - Local Development
# Disable managed identity, use Azure CLI authentication
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:your-storage-account}
azure.storage.blob.container-name=${AZURE_STORAGE_BLOB_CONTAINER_NAME:images}

# Max file size for uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Azure Service Bus - Local Development (uses Azure CLI authentication)
# Disable managed identity for local development
spring.cloud.azure.credential.managed-identity-enabled=false
spring.cloud.azure.credential.chain.environment-enabled=true
spring.cloud.azure.credential.chain.managed-identity-enabled=false
spring.cloud.azure.credential.chain.azure-cli-enabled=true
spring.cloud.azure.servicebus.namespace=${AZURE_SERVICEBUS_NAMESPACE:your-servicebus-namespace}
spring.cloud.azure.servicebus.entity-type=queue
spring.cloud.azure.servicebus.credential.managed-identity-enabled=false

# Use connection string for local development (more info below)
# spring.cloud.azure.servicebus.connection-string=${AZURE_SERVICEBUS_CONNECTION_STRING}

# Database Configuration - Connect to Azure PostgreSQL
spring.datasource.url=jdbc:postgresql://${AZURE_POSTGRES_SERVER:your-server}.postgres.database.azure.com:5432/${AZURE_POSTGRES_DB:assets_manager}?sslmode=require&sslrootcert=/dev/null
spring.datasource.username=${AZURE_POSTGRES_USER:your-username}
spring.datasource.password=${AZURE_POSTGRES_PASSWORD:your-password}
spring.datasource.azure.passwordless-enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
