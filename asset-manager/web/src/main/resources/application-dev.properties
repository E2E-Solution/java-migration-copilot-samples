# Dev Profile - Local Development Configuration
spring.application.name=assets-manager

# Use local file storage instead of Azure Blob Storage
local.storage.path=./uploads

# Use in-memory or local PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:5432/assets_manager_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Disable Azure Service Bus auto-configuration for dev mode
spring.cloud.azure.servicebus.enabled=false
spring.cloud.azure.credential.managed-identity-enabled=false

# Provide dummy values to satisfy Azure autoconfiguration
azure.storage.account-name=devstoreaccount1
azure.storage.blob.container-name=images
spring.cloud.azure.servicebus.namespace=local-dev

# Local Service Bus simulation (messages will be logged)
# Note: You'll need to implement a local queue or use Azure Service Bus emulator

# Max file size for uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Management endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
