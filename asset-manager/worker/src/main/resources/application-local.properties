# Local Profile with Azure Services - Worker
spring.application.name=assets-manager-worker

# Management endpoints configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# Azure Blob Storage Configuration
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:your-storage-account}
azure.storage.blob.container-name=${AZURE_STORAGE_BLOB_CONTAINER_NAME:images}

# Azure Service Bus - Local Development (uses Azure CLI authentication)
# Disable managed identity for local development
spring.cloud.azure.credential.managed-identity-enabled=false
spring.cloud.azure.servicebus.namespace=${AZURE_SERVICEBUS_NAMESPACE:your-servicebus-namespace}
spring.cloud.azure.servicebus.entity-type=queue

# Use connection string for local development
# spring.cloud.azure.servicebus.connection-string=${AZURE_SERVICEBUS_CONNECTION_STRING}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${AZURE_POSTGRES_SERVER:your-server}.postgres.database.azure.com:5432/${AZURE_POSTGRES_DB:assets_manager}?sslmode=require&sslrootcert=/dev/null
spring.datasource.username=${AZURE_POSTGRES_USER:your-username}
spring.datasource.password=${AZURE_POSTGRES_PASSWORD:your-password}
spring.datasource.azure.passwordless-enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
